<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>XBotV2文档中心</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="XBotV2是一个功能强大的微信机器人框架，基于Python开发，提供了丰富的API和插件系统">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css">
    <style>
        :root {
            --sidebar-width: 300px;
            --content-max-width: 900px;
        }
        .app-name img {
            width: 150px;
            height: auto;
        }
        .markdown-section pre>code {
            font-family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
        }
        .markdown-section code {
            font-family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
        }
        .markdown-section {
            max-width: var(--content-max-width);
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    window.$docsify = {
        name: 'XBotV2',
        repo: 'https://github.com/xiaoxinkeji/xbotv2',
        logo: '/_media/logo.png',
        loadSidebar: true,
        subMaxLevel: 3,
        coverpage: true,
        auto2top: true,
        homepage: 'README.md',
        search: {
            maxAge: 86400000,
            paths: 'auto',
            placeholder: '搜索文档',
            noData: '未找到结果',
            depth: 6
        },
        copyCode: {
            buttonText: '复制',
            errorText: '错误',
            successText: '已复制'
        },
        pagination: {
            previousText: '上一章',
            nextText: '下一章',
        },
        themeColor: '#42b983'
    }
</script>
<!-- Docsify v4 -->
<script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
</body>
</html>
