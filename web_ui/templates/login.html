<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <!-- 引入Element Plus样式 -->
    <link rel="stylesheet" href="/static/vendor/element-plus.min.css">
    <!-- 引入自定义样式 -->
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/login.css">
    <!-- 图标和Favicon -->
    <link rel="shortcut icon" href="/static/img/logo.png">
</head>
<body>
    <div id="login-app">
        <noscript>
            <div class="fallback-login">
                <h1>XYBot管理系统登录</h1>
                <form action="/api/auth/login" method="post">
                    <div>
                        <label>用户名:</label>
                        <input type="text" name="username">
                    </div>
                    <div>
                        <label>密码:</label>
                        <input type="password" name="password">
                    </div>
                    <button type="submit">登录</button>
                </form>
                <p>需要启用JavaScript以获得完整体验</p>
            </div>
        </noscript>
        <!-- Vue组件将在这里渲染 -->
    </div>
    
    <!-- 使用本地资源 -->
    <script src="/static/vendor/vue.min.js"></script>
    <script src="/static/vendor/element-plus.min.js"></script>
    <!-- 引入Axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    
    <!-- 引入登录组件 -->
    <script src="/static/js/login.js"></script>
    
    <script>
        const app = Vue.createApp({});
        app.component('component-login', ComponentLogin);
        app.use(ElementPlus);
        app.mount('#login-app');
    </script>
</body>
</html>
