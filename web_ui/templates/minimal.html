<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYBot - 简化版</title>
    <link rel="stylesheet" href="/static/vendor/element-plus.min.css">
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .app-header {
            background-color: #409EFF;
            color: white;
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left {
            display: flex;
            align-items: center;
        }
        .sidebar-toggle {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-right: 15px;
        }
        .app-title {
            margin: 0;
            font-size: 18px;
        }
        .app-sidebar {
            width: 220px;
            background-color: #f5f7fa;
            border-right: 1px solid #e6e6e6;
            transition: all 0.3s;
        }
        .app-sidebar.collapsed {
            width: 60px;
        }
        .sidebar-header {
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #e6e6e6;
        }
        .sidebar-logo {
            width: 30px;
            height: 30px;
        }
        .sidebar-title {
            margin-left: 10px;
            font-weight: bold;
        }
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            padding: 10px 0;
        }
        .sidebar-menu a {
            padding: 10px 15px;
            color: #303133;
            text-decoration: none;
            cursor: pointer;
        }
        .sidebar-menu a:hover, .sidebar-menu a.active {
            background-color: #ecf5ff;
            color: #409EFF;
        }
        .app-main {
            flex: 1;
            padding: 20px;
            background-color: #f5f7fa;
        }
        .main-content {
            background-color: white;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
        }
        @media (min-width: 768px) {
            .app-container {
                flex-direction: row;
            }
            .app-main {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Vue应用将挂载在这里 -->
        <div class="loading">加载中...</div>
    </div>
    
    <script src="/static/vendor/vue.global.min.js"></script>
    <script src="/static/vendor/element-plus.full.min.js"></script>
    <script src="/static/vendor/axios.min.js"></script>
    <script src="/static/js/app-minimal.js"></script>
</body>
</html>
