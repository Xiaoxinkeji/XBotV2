<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器错误 - XYBot</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 0 20px;
        }
        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #F56C6C;
            margin: 0;
        }
        .error-message {
            font-size: 24px;
            margin: 20px 0;
        }
        .error-detail {
            margin: 10px 0;
            padding: 15px;
            background-color: #f8f8f8;
            border-radius: 4px;
            color: #606266;
            max-width: 600px;
            overflow-wrap: break-word;
        }
        .home-button {
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #409EFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-code">500</h1>
        <p class="error-message">服务器内部错误</p>
        <p>抱歉，服务器处理请求时出现错误</p>
        {% if error %}
        <div class="error-detail">
            {{ error }}
        </div>
        {% endif %}
        <a href="/" class="home-button">返回首页</a>
    </div>
</body>
</html>
