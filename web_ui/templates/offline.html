<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYBot - 离线诊断</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f5f7fa;
        }
        
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #409EFF;
            border-bottom: 1px solid #EBEEF5;
            padding-bottom: 10px;
        }
        
        .diagnostic-card {
            border: 1px solid #EBEEF5;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .diagnostic-title {
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .resource-item {
            display: flex;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #EBEEF5;
        }
        
        .resource-item:last-child {
            border-bottom: none;
        }
        
        .resource-name {
            flex: 1;
        }
        
        .resource-status {
            font-weight: bold;
        }
        
        .success {
            color: #67C23A;
        }
        
        .error {
            color: #F56C6C;
        }
        
        .warning {
            color: #E6A23C;
        }
        
        .action-buttons {
            margin-top: 20px;
            text-align: center;
        }
        
        .btn {
            display: inline-block;
            padding: 8px 16px;
            margin: 0 5px;
            border-radius: 4px;
            text-decoration: none;
            color: white;
            cursor: pointer;
        }
        
        .btn-primary {
            background-color: #409EFF;
        }
        
        .btn-warning {
            background-color: #E6A23C;
        }
        
        .progress-bar {
            height: 20px;
            width: 100%;
            background-color: #EBEEF5;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background-color: #409EFF;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>XYBot离线诊断工具</h1>
        
        <div class="diagnostic-card">
            <div class="diagnostic-title">前端资源状态检查</div>
            <div id="resources-list">
                <!-- 资源列表将动态添加 -->
                <div class="resource-item">
                    <div class="resource-name">检查中...</div>
                    <div class="resource-status">-</div>
                </div>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>
        
        <div class="diagnostic-card">
            <div class="diagnostic-title">可能的解决方案</div>
            <ul id="solutions">
                <li>请等待检查完成</li>
            </ul>
        </div>
        
        <div class="action-buttons">
            <a href="/" class="btn btn-primary">返回主页</a>
            <a href="/simple" class="btn btn-warning">使用简易版</a>
        </div>
    </div>
    
    <script>
        // 需要检查的资源
        const resources = [
            { name: 'Vue.js', url: '/static/vendor/vue.global.min.js' },
            { name: 'Element Plus JS', url: '/static/vendor/element-plus.full.min.js' },
            { name: 'Element Plus CSS', url: '/static/vendor/element-plus.min.css' },
            { name: 'Axios', url: '/static/vendor/axios.min.js' },
            { name: 'ECharts', url: '/static/vendor/echarts.min.js' },
            { name: '仪表盘组件', url: '/static/js/dashboard.js' },
            { name: '插件组件', url: '/static/js/plugins.js' },
            { name: '用户组件', url: '/static/js/users.js' },
            { name: '消息组件', url: '/static/js/messages.js' },
            { name: '状态组件', url: '/static/js/status.js' },
            { name: '主应用', url: '/static/js/main.js' }
        ];
        
        // 检查结果
        let results = [];
        
        // 更新进度
        function updateProgress(current, total) {
            const percent = Math.round((current / total) * 100);
            document.getElementById('progress-fill').style.width = percent + '%';
        }
        
        // 检查资源
        async function checkResources() {
            const resourcesList = document.getElementById('resources-list');
            resourcesList.innerHTML = '';
            
            for (let i = 0; i < resources.length; i++) {
                const resource = resources[i];
                const item = document.createElement('div');
                item.className = 'resource-item';
                
                const nameDiv = document.createElement('div');
                nameDiv.className = 'resource-name';
                nameDiv.textContent = resource.name;
                
                const statusDiv = document.createElement('div');
                statusDiv.className = 'resource-status';
                statusDiv.textContent = '检查中...';
                
                item.appendChild(nameDiv);
                item.appendChild(statusDiv);
                resourcesList.appendChild(item);
                
                // 更新进度
                updateProgress(i, resources.length);
                
                // 检查资源是否可访问
                try {
                    const response = await fetch(resource.url, { method: 'HEAD' });
                    const result = {
                        name: resource.name,
                        url: resource.url,
                        status: response.ok ? 'success' : 'error',
                        statusCode: response.status
                    };
                    
                    statusDiv.textContent = response.ok ? '可用' : '不可用';
                    statusDiv.className = 'resource-status ' + (response.ok ? 'success' : 'error');
                    
                    results.push(result);
                } catch (error) {
                    statusDiv.textContent = '网络错误';
                    statusDiv.className = 'resource-status error';
                    
                    results.push({
                        name: resource.name,
                        url: resource.url,
                        status: 'error',
                        error: error.message
                    });
                }
                
                // 小延迟，避免UI卡顿
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            
            updateProgress(resources.length, resources.length);
            generateSolutions();
        }
        
        // 生成解决方案
        function generateSolutions() {
            const solutionsList = document.getElementById('solutions');
            solutionsList.innerHTML = '';
            
            const failedResources = results.filter(r => r.status === 'error');
            
            if (failedResources.length === 0) {
                addSolution('所有资源检查正常，但页面仍有问题，可能是JavaScript执行错误。');
                addSolution('请尝试清除浏览器缓存后重新加载页面。');
                return;
            }
            
            // 检查是否所有本地资源都无法访问
            const allLocalFailed = failedResources.every(r => r.url.startsWith('/static/'));
            if (allLocalFailed) {
                addSolution('所有本地资源无法访问，可能是静态文件服务异常。');
                addSolution('请检查服务器是否已正确配置静态文件目录。');
                addSolution('建议重启Web服务。');
                return;
            }
            
            // 具体资源建议
            if (failedResources.some(r => r.url.includes('vendor'))) {
                addSolution('部分依赖库文件丢失，请确保vendor目录中包含所有必要的库文件。');
                addSolution('可以使用命令手动下载这些文件至vendor目录。');
            }
            
            if (failedResources.some(r => r.url.includes('echarts'))) {
                addSolution('ECharts图表库无法加载，这会影响数据可视化功能。');
            }
            
            if (failedResources.some(r => r.url.includes('.js'))) {
                addSolution('部分JavaScript文件加载失败，界面功能将受影响。');
            }
            
            addSolution('如果问题持续存在，请尝试使用简易版页面，或联系管理员。');
        }
        
        // 添加解决方案条目
        function addSolution(text) {
            const solutionsList = document.getElementById('solutions');
            const item = document.createElement('li');
            item.textContent = text;
            solutionsList.appendChild(item);
        }
        
        // 页面加载后开始检查
        window.onload = function() {
            checkResources();
        };
    </script>
</body>
</html>
