<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <!-- 首先加载资源加载器 -->
    <script src="/static/js/resource-loader.js"></script>
    <!-- 样式表 -->
    <link rel="stylesheet" href="/static/vendor/element-plus.min.css">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/icons.css">
    <link rel="stylesheet" href="/static/css/wechat.css">
    <!-- 图标和Favicon -->
    <link rel="shortcut icon" href="/static/img/logo.png">
    <style>
        /* 加载动画样式 */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .loading-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite alternate;
        }
        .loading-text {
            font-size: 18px;
            color: #409EFF;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* 添加应急模式样式 */
        .minimal-app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        
        .app-header {
            background-color: #409EFF;
            color: white;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .app-header h1 {
            margin: 0;
        }
        
        .main-content {
            background-color: white;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1);
        }
        
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-card {
            padding: 15px;
            border-radius: 4px;
            background-color: #f5f7fa;
            box-shadow: 0 2px 12px 0 rgba(0,0,0,0.05);
        }
        
        #refresh-btn {
            background-color: #409EFF;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading-container">
            <img src="/static/img/logo.png" class="loading-logo" alt="XYBot Logo">
            <div class="loading-text">正在加载资源...</div>
        </div>
    </div>

    <!-- 应用程序入口点 -->
    <script>
        // 等待资源加载器准备就绪
        function initializeApp() {
            if (typeof Vue !== 'undefined') {
                console.log('Vue 已加载，初始化应用');
                const app = Vue.createApp({
                    data() {
                        return {
                            activeComponent: 'dashboard'
                        }
                    },
                    methods: {
                        switchComponent(component) {
                            this.activeComponent = component;
                        }
                    }
                });
                
                // 注册组件
                if (typeof ComponentDashboard !== 'undefined') {
                    app.component('dashboard', ComponentDashboard);
                }
                if (typeof ComponentPlugins !== 'undefined') {
                    app.component('plugins', ComponentPlugins);
                }
                if (typeof ComponentUsers !== 'undefined') {
                    app.component('users', ComponentUsers);
                }
                if (typeof ComponentMessages !== 'undefined') {
                    app.component('messages', ComponentMessages);
                }
                if (typeof ComponentStatus !== 'undefined') {
                    app.component('status', ComponentStatus);
                }
                
                // 使用ElementPlus (如果可用)
                if (typeof ElementPlus !== 'undefined') {
                    app.use(ElementPlus);
                }
                
                // 挂载应用
                app.mount('#app');
            } else {
                console.error('Vue 未加载，尝试备用初始化');
                const appContainer = document.getElementById('app');
                appContainer.innerHTML = `
                    <div style="max-width:800px;margin:40px auto;padding:20px;text-align:center;">
                        <h2>XYBot管理面板</h2>
                        <p>前端资源加载失败，请尝试以下选项：</p>
                        <div style="margin-top:20px;">
                            <a href="/simple" style="display:inline-block;margin:10px;padding:10px 20px;background:#409EFF;color:white;text-decoration:none;border-radius:4px;">
                                使用简易版
                            </a>
                            <a href="/offline" style="display:inline-block;margin:10px;padding:10px 20px;background:#67C23A;color:white;text-decoration:none;border-radius:4px;">
                                运行诊断
                            </a>
                        </div>
                    </div>
                `;
            }
        }
        
        // 检查Vue是否已加载，如果加载则初始化应用
        function checkAndInitialize() {
            if (typeof Vue !== 'undefined') {
                initializeApp();
            } else {
                // 等待并再次检查
                setTimeout(checkAndInitialize, 100);
            }
        }
        
        // 页面加载完成后启动检查
        window.addEventListener('load', checkAndInitialize);
    </script>
    
    <!-- 组件脚本 -->
    <script src="/static/js/plugins.js"></script>
    <script src="/static/js/users.js"></script>
    <script src="/static/js/messages.js"></script>
    <script src="/static/js/status.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
