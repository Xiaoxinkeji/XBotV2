<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    
    <!-- 添加基本错误捕获 -->
    <script>
    window.onerror = function(message, source, lineno, colno, error) {
        console.error('全局错误:', message, source, lineno, colno);
        // 显示错误信息在页面上
        if (document.body) {
            var errorDiv = document.createElement('div');
            errorDiv.style.padding = '20px';
            errorDiv.style.margin = '20px';
            errorDiv.style.backgroundColor = '#ffebee';
            errorDiv.style.border = '1px solid #f44336';
            errorDiv.innerHTML = '<h2>页面加载错误</h2>' +
                                '<p>错误信息: ' + message + '</p>' +
                                '<p>源文件: ' + source + '</p>' +
                                '<p>行号: ' + lineno + '</p>';
            document.body.appendChild(errorDiv);
        }
        return false;
    };
    </script>
    
    <!-- 首先加载资源加载器 -->
    <script src="/static/js/resource-loader.js"></script>
    
    <!-- 样式表 -->
    <link rel="stylesheet" href="/static/vendor/element-plus.min.css">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/icons.css">
    <link rel="stylesheet" href="/static/css/wechat.css">
    <!-- 图标和Favicon -->
    <link rel="shortcut icon" href="/static/img/logo.png">
    <style>
        /* 加载动画样式 */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .loading-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite alternate;
        }
        .loading-text {
            font-size: 18px;
            color: #409EFF;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* 添加应急模式样式 */
        .minimal-app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        
        .app-header {
            background-color: #409EFF;
            color: white;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .app-header h1 {
            margin: 0;
        }
        
        .main-content {
            background-color: white;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1);
        }
        
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-card {
            padding: 15px;
            border-radius: 4px;
            background-color: #f5f7fa;
            box-shadow: 0 2px 12px 0 rgba(0,0,0,0.05);
        }
        
        #refresh-btn {
            background-color: #409EFF;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <!-- 添加初始加载指示器 -->
    <div id="loading-indicator" style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;">
        <div style="font-size:24px;margin-bottom:20px;">加载中...</div>
        <div style="width:50px;height:50px;border:5px solid #f3f3f3;border-top:5px solid #3498db;border-radius:50%;animation:spin 2s linear infinite;"></div>
    </div>
    
    <div id="app">
        <!-- Vue应用将在这里挂载 -->
    </div>
    
    <!-- 添加错误显示区域 -->
    <div id="error-container" style="display:none;padding:20px;margin:20px;background-color:#ffebee;border:1px solid #f44336;">
    </div>
    
    <style>
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    </style>
    
    <!-- 基础脚本，确保按顺序加载 -->
    <script>
    // 基础脚本加载器
    function loadScript(src, callback) {
        var script = document.createElement('script');
        script.src = src;
        script.onload = callback;
        script.onerror = function() {
            console.error('脚本加载失败:', src);
            showError('脚本加载失败: ' + src);
        };
        document.head.appendChild(script);
    }
    
    function showError(message) {
        var errorContainer = document.getElementById('error-container');
        errorContainer.style.display = 'block';
        errorContainer.innerHTML = '<h2>错误</h2><p>' + message + '</p>';
        
        // 隐藏加载指示器
        document.getElementById('loading-indicator').style.display = 'none';
    }
    
    // 按顺序加载核心脚本
    document.addEventListener('DOMContentLoaded', function() {
        loadScript('/static/vendor/vue.global.js', function() {
            loadScript('/static/vendor/element-plus.min.js', function() {
                // 其他脚本...
                loadScript('/static/js/main.js', initializeApp);
            });
        });
    });
    
    function initializeApp() {
        // 隐藏加载指示器
        document.getElementById('loading-indicator').style.display = 'none';
        
        // 初始化Vue应用
        if (typeof Vue !== 'undefined') {
            const app = Vue.createApp({
                data() {
                    return {
                        activeComponent: 'dashboard'
                    }
                },
                methods: {
                    switchComponent(component) {
                        this.activeComponent = component;
                    }
                }
            });
            
            // 注册组件
            if (typeof ComponentDashboard !== 'undefined') {
                app.component('dashboard', ComponentDashboard);
            }
            if (typeof ComponentPlugins !== 'undefined') {
                app.component('plugins', ComponentPlugins);
            }
            if (typeof ComponentUsers !== 'undefined') {
                app.component('users', ComponentUsers);
            }
            if (typeof ComponentMessages !== 'undefined') {
                app.component('messages', ComponentMessages);
            }
            if (typeof ComponentStatus !== 'undefined') {
                app.component('status', ComponentStatus);
            }
            
            // 使用ElementPlus (如果可用)
            if (typeof ElementPlus !== 'undefined') {
                app.use(ElementPlus);
            }
            
            // 挂载应用
            app.mount('#app');
        } else {
            showError('Vue框架未加载，请检查网络连接');
        }
    }
    </script>
    
    <!-- 组件脚本 -->
    <script src="/static/js/plugins.js"></script>
    <script src="/static/js/users.js"></script>
    <script src="/static/js/messages.js"></script>
    <script src="/static/js/status.js"></script>

    <!-- 在适当位置添加重连按钮 -->
    <div class="status-item">
        <span class="status-label">微信API:</span>
        <span id="wechat-status" class="status-value status-unknown">检查中...</span>
        <button id="wechat-reconnect-btn" style="display:none;margin-left:10px;" 
                class="el-button el-button--small el-button--primary">
            重新连接
        </button>
    </div>

    <!-- 添加新的JS脚本 -->
    <script src="/static/js/wechat-actions.js"></script>
</body>
</html>
