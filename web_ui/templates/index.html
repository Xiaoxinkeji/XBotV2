<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <!-- 引入Element Plus样式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.3.14/dist/index.min.css">
    <!-- 添加Element Plus图标 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue">
    <!-- 引入自定义样式 -->
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <!-- 图标和Favicon -->
    <link rel="shortcut icon" href="/static/img/logo.png">
    <style>
        /* 加载动画样式 */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .loading-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite alternate;
        }
        .loading-text {
            font-size: 18px;
            color: #409EFF;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 加载动画 -->
        <div class="loading-container">
            <img src="/static/img/logo.png" alt="XYBot Logo" class="loading-logo">
            <div class="loading-text">加载中，请稍候...</div>
        </div>
    </div>
    
    <!-- 引入Vue3 -->
    <script src="https://unpkg.com/vue@3.2.47/dist/vue.global.prod.js"></script>
    <!-- 引入Element Plus -->
    <script src="https://unpkg.com/element-plus@2.3.1/dist/index.full.min.js"></script>
    <!-- 引入Axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <!-- 引入ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.2/dist/echarts.min.js"></script>
    
    <!-- 引入自定义组件 -->
    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/plugins.js"></script>
    <script src="/static/js/users.js"></script>
    <script src="/static/js/messages.js"></script>
    <script src="/static/js/status.js"></script>
    
    <!-- 引入主应用 -->
    <script src="/static/js/main.js"></script>
    
    <script>
        // 全局消息通知配置
        const MessageConfig = {
            showClose: true,
            duration: 3000
        };
        
        // 全局错误处理
        window.addEventListener('error', function(event) {
            console.error('全局错误:', event.error);
            ElementPlus.ElMessage.error({
                message: '系统出现错误，请刷新页面或联系管理员',
                ...MessageConfig
            });
        });
        
        // 为移动设备显示滑动提示
        if (window.innerWidth < 768) {
            const showSwipeHint = () => {
                // 检查是否已显示过提示
                if (localStorage.getItem('swipeHintShown')) return;
                
                const hint = document.createElement('div');
                hint.className = 'mobile-swipe-hint';
                hint.textContent = '向右滑动打开菜单';
                document.body.appendChild(hint);
                
                // 标记已显示提示
                localStorage.setItem('swipeHintShown', 'true');
                
                // 动画结束后移除提示
                setTimeout(() => {
                    hint.remove();
                }, 3000);
            };
            
            // 延迟显示提示
            setTimeout(showSwipeHint, 1500);
        }
        
        // AJAX错误拦截
        axios.interceptors.response.use(
            response => response,
            error => {
                if (error.response) {
                    // 如果是401错误，重定向到登录页
                    if (error.response.status === 401) {
                        window.location.href = '/login';
                        return Promise.reject(error);
                    }
                    
                    // 显示后端返回的错误信息
                    const errorMsg = error.response.data.message || '请求失败';
                    ElementPlus.ElMessage.error({
                        message: errorMsg,
                        ...MessageConfig
                    });
                } else {
                    // 网络错误等
                    ElementPlus.ElMessage.error({
                        message: '网络连接失败，请检查网络设置',
                        ...MessageConfig
                    });
                }
                return Promise.reject(error);
            }
        );
    </script>
</body>
</html>
