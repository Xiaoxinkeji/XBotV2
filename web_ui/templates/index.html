<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <!-- 使用本地资源文件 -->
    <link rel="stylesheet" href="/static/vendor/element-plus.min.css">
    <!-- 引入自定义样式 -->
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/icons.css">
    <link rel="stylesheet" href="/static/css/wechat.css">
    <!-- 图标和Favicon -->
    <link rel="shortcut icon" href="/static/img/logo.png">
    <style>
        /* 加载动画样式 */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .loading-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite alternate;
        }
        .loading-text {
            font-size: 18px;
            color: #409EFF;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* 添加应急模式样式 */
        .minimal-app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        
        .app-header {
            background-color: #409EFF;
            color: white;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .app-header h1 {
            margin: 0;
        }
        
        .main-content {
            background-color: white;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1);
        }
        
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-card {
            padding: 15px;
            border-radius: 4px;
            background-color: #f5f7fa;
            box-shadow: 0 2px 12px 0 rgba(0,0,0,0.05);
        }
        
        #refresh-btn {
            background-color: #409EFF;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 加载动画 -->
        <div class="loading-container">
            <img src="/static/img/logo.png" alt="XYBot Logo" class="loading-logo">
            <div class="loading-text">加载中，请稍候...</div>
        </div>
    </div>
    
    <!-- 使用本地脚本或备用资源 -->
    <script>
        // 资源加载错误处理
        function handleScriptError(scriptName) {
            console.error(`${scriptName}加载失败，尝试备用方案`);
            document.querySelector('.loading-text').textContent = `${scriptName}加载失败，尝试备用方案...`;
            return true; // 允许继续加载其他资源
        }
    </script>
    
    <!-- 先尝试加载本地资源 -->
    <script src="/static/vendor/vue.global.min.js" onerror="handleScriptError('Vue')"></script>
    <script src="/static/vendor/element-plus.full.min.js" onerror="handleScriptError('ElementPlus')"></script>
    <script src="/static/vendor/axios.min.js" onerror="handleScriptError('Axios')"></script>
    <script src="/static/vendor/echarts.min.js" onerror="handleScriptError('ECharts')"></script>
    
    <!-- 检查Vue是否加载成功，如果失败则加载极简版 -->
    <script>
        if (typeof Vue === 'undefined') {
            console.log('Vue加载失败，使用极简版');
            document.write('<script src="/static/vendor/minimal-vue.js"><\/script>');
        }
    </script>
    
    <!-- 检查依赖加载状态并显示简化版 -->
    <script>
        // 资源加载处理
        document.addEventListener('DOMContentLoaded', function() {
            const loader = document.createElement('div');
            loader.className = 'loading-container';
            loader.innerHTML = `
                <img src="/static/img/logo.png" class="loading-logo" alt="XYBot Logo">
                <div class="loading-text">正在加载资源...</div>
            `;
            document.body.appendChild(loader);
            
            // 加载必要的库
            const requiredLibs = [
                { name: 'Vue', path: '/static/vendor/vue.global.min.js', fallback: '/static/vendor/minimal-vue.js' },
                { name: 'ElementPlus', path: '/static/vendor/element-plus.full.min.js' },
                { name: 'axios', path: '/static/vendor/axios.min.js' },
                { name: 'echarts', path: '/static/vendor/echarts.min.js', fallback: '/static/js/fallback-charts.js' }
            ];
            
            // 顺序加载库
            loadLibsSequentially(requiredLibs, 0, function(success, failed) {
                if (failed.length > 0) {
                    console.warn('以下库加载失败，将使用备用方案:', failed.join(', '));
                }
                
                // 移除加载指示器
                document.body.removeChild(loader);
                
                // 继续加载应用组件
                loadAppComponents();
            });
        });
        
        // 顺序加载库函数
        function loadLibsSequentially(libs, index, callback, successList = [], failedList = []) {
            if (index >= libs.length) {
                return callback(successList, failedList);
            }
            
            const lib = libs[index];
            
            // 检查库是否已加载
            if (window[lib.name]) {
                console.log(`${lib.name} 已加载`);
                successList.push(lib.name);
                return loadLibsSequentially(libs, index + 1, callback, successList, failedList);
            }
            
            // 加载主要版本
            loadScript(lib.path, function(success) {
                if (success) {
                    console.log(`${lib.name} 加载成功`);
                    successList.push(lib.name);
                    loadLibsSequentially(libs, index + 1, callback, successList, failedList);
                } else {
                    console.warn(`${lib.name} 加载失败，尝试备用方案...`);
                    
                    // 如果有备用方案，尝试加载
                    if (lib.fallback) {
                        loadScript(lib.fallback, function(fallbackSuccess) {
                            if (fallbackSuccess) {
                                console.log(`${lib.name} 备用方案加载成功`);
                                successList.push(lib.name + '(备用)');
                            } else {
                                console.error(`${lib.name} 及其备用方案均加载失败`);
                                failedList.push(lib.name);
                            }
                            loadLibsSequentially(libs, index + 1, callback, successList, failedList);
                        });
                    } else {
                        failedList.push(lib.name);
                        loadLibsSequentially(libs, index + 1, callback, successList, failedList);
                    }
                }
            });
        }
        
        // 加载单个脚本
        function loadScript(src, callback) {
            const script = document.createElement('script');
            script.src = src;
            
            script.onload = function() {
                callback(true);
            };
            
            script.onerror = function() {
                callback(false);
            };
            
            document.head.appendChild(script);
        }
        
        // 加载应用组件
        function loadAppComponents() {
            const components = [
                '/static/js/dashboard.js',
                '/static/js/plugins.js',
                '/static/js/users.js',
                '/static/js/messages.js',
                '/static/js/status.js',
                '/static/js/main.js'
            ];
            
            // 创建简单Vue应用容器
            const appContainer = document.getElementById('app');
            appContainer.innerHTML = `
                <div id="fallback-app" style="display: none;">
                    <header class="app-header">
                        <h1>XYBot管理面板 (兼容模式)</h1>
                    </header>
                    <main class="fallback-main">
                        <div class="status-card">
                            <h2>系统状态</h2>
                            <p>前端资源加载不完整，请检查网络连接或联系管理员。</p>
                            <button onclick="window.location.reload()">刷新页面</button>
                            <button onclick="window.location.href='/wechat-login'">微信登录</button>
                            <button onclick="window.location.href='/simple'">简易版</button>
                        </div>
                    </main>
                </div>
            `;
            
            // 依次加载组件
            loadComponentsSequentially(components, 0, function(loadedCount) {
                if (loadedCount < components.length) {
                    console.warn(`部分组件加载失败 (${loadedCount}/${components.length})`);
                    document.getElementById('fallback-app').style.display = 'block';
                }
            });
        }
        
        // 顺序加载组件
        function loadComponentsSequentially(components, index, callback, loadedCount = 0) {
            if (index >= components.length) {
                return callback(loadedCount);
            }
            
            loadScript(components[index], function(success) {
                if (success) {
                    loadedCount++;
                }
                loadComponentsSequentially(components, index + 1, callback, loadedCount);
            });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.1.0"></script>
</body>
</html>
