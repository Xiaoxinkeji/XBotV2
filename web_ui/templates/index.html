<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <!-- 使用本地资源文件 -->
    <link rel="stylesheet" href="/static/vendor/element-plus.min.css">
    <!-- 引入自定义样式 -->
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/icons.css">
    <!-- 图标和Favicon -->
    <link rel="shortcut icon" href="/static/img/logo.png">
    <style>
        /* 加载动画样式 */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .loading-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite alternate;
        }
        .loading-text {
            font-size: 18px;
            color: #409EFF;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* 添加应急模式样式 */
        .minimal-app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        
        .app-header {
            background-color: #409EFF;
            color: white;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .app-header h1 {
            margin: 0;
        }
        
        .main-content {
            background-color: white;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1);
        }
        
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-card {
            padding: 15px;
            border-radius: 4px;
            background-color: #f5f7fa;
            box-shadow: 0 2px 12px 0 rgba(0,0,0,0.05);
        }
        
        #refresh-btn {
            background-color: #409EFF;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 加载动画 -->
        <div class="loading-container">
            <img src="/static/img/logo.png" alt="XYBot Logo" class="loading-logo">
            <div class="loading-text">加载中，请稍候...</div>
        </div>
    </div>
    
    <!-- 使用本地脚本或备用资源 -->
    <script>
        // 资源加载错误处理
        function handleScriptError(scriptName) {
            console.error(`${scriptName}加载失败，尝试备用方案`);
            document.querySelector('.loading-text').textContent = `${scriptName}加载失败，尝试备用方案...`;
            return true; // 允许继续加载其他资源
        }
    </script>
    
    <!-- 先尝试加载本地资源 -->
    <script src="/static/vendor/vue.global.min.js" onerror="handleScriptError('Vue')"></script>
    <script src="/static/vendor/element-plus.full.min.js" onerror="handleScriptError('ElementPlus')"></script>
    <script src="/static/vendor/axios.min.js" onerror="handleScriptError('Axios')"></script>
    <script src="/static/vendor/echarts.min.js" onerror="handleScriptError('ECharts')"></script>
    
    <!-- 检查Vue是否加载成功，如果失败则加载极简版 -->
    <script>
        if (typeof Vue === 'undefined') {
            console.log('Vue加载失败，使用极简版');
            document.write('<script src="/static/vendor/minimal-vue.js"><\/script>');
        }
    </script>
    
    <!-- 检查依赖加载状态并显示简化版 -->
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            // 检查核心依赖
            const missingDependencies = [];
            if (typeof Vue === 'undefined') missingDependencies.push('Vue');
            if (typeof ElementPlus === 'undefined') missingDependencies.push('ElementPlus');
            if (typeof axios === 'undefined') missingDependencies.push('Axios');
            
            if (missingDependencies.length > 0) {
                console.error('缺少核心依赖:', missingDependencies.join(', '));
                
                const container = document.getElementById('app');
                container.innerHTML = `
                    <div class="minimal-app">
                        <header class="app-header">
                            <h1>XYBot管理面板(简化版)</h1>
                        </header>
                        <div class="main-content">
                            <h2>资源加载受限</h2>
                            <p>系统无法加载以下前端依赖库: ${missingDependencies.join(', ')}</p>
                            <div class="card-container">
                                <div class="stat-card">
                                    <h3>系统状态</h3>
                                    <div class="stat-value">正在运行</div>
                                    <p>微信接口: <a href="/api/health" target="_blank">查看状态</a></p>
                                </div>
                            </div>
                            <p>
                                <a href="/diagnostic" class="btn">查看诊断</a>
                                <button onclick="window.location.reload()" id="refresh-btn">刷新页面</button>
                            </p>
                        </div>
                    </div>
                `;
                return;
            }
            
            // 正常加载组件和主应用
            loadScripts([
                '/static/js/dashboard.js',
                '/static/js/plugins.js',
                '/static/js/users.js',
                '/static/js/messages.js',
                '/static/js/status.js',
                '/static/js/main.js'
            ]);
        });
        
        // 顺序加载脚本
        function loadScripts(scripts) {
            if (scripts.length === 0) return;
            
            const script = document.createElement('script');
            script.src = scripts[0];
            script.onload = function() {
                loadScripts(scripts.slice(1));
            };
            script.onerror = function() {
                console.error(`组件脚本加载失败: ${scripts[0]}`);
                loadScripts(scripts.slice(1));
            };
            document.body.appendChild(script);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.1.0"></script>
</body>
</html>
