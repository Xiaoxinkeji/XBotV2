<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYBot - 系统状态</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f5f7fa;
        }
        
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #409EFF;
            border-bottom: 1px solid #EBEEF5;
            padding-bottom: 10px;
        }
        
        .card {
            border: 1px solid #EBEEF5;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .card h2 {
            margin-top: 0;
            color: #303133;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #EBEEF5;
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .success {
            color: #67C23A;
        }
        
        .error {
            color: #F56C6C;
        }
        
        .warning {
            color: #E6A23C;
        }
        
        button {
            background-color: #409EFF;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #66b1ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>XYBot系统状态</h1>
        
        <div class="card">
            <h2>系统信息</h2>
            <div id="system-info">加载中...</div>
        </div>
        
        <div class="card">
            <h2>服务状态</h2>
            <div id="service-status">加载中...</div>
        </div>
        
        <div class="card">
            <h2>资源使用情况</h2>
            <div id="resource-usage">加载中...</div>
        </div>
        
        <div style="text-align: center; margin-top: 20px;">
            <button onclick="window.location.reload()">刷新</button>
            <button onclick="window.location.href='/'">返回首页</button>
        </div>
    </div>
    
    <script>
        // 简单的XHR请求函数
        function fetchData(url, callback) {
            const xhr = new XMLHttpRequest();
            xhr.open('GET', url);
            xhr.onload = () => {
                if (xhr.status >= 200 && xhr.status < 300) {
                    callback(null, JSON.parse(xhr.responseText));
                } else {
                    callback(new Error(`请求失败: ${xhr.statusText}`));
                }
            };
            xhr.onerror = () => {
                callback(new Error('网络请求失败'));
            };
            xhr.send();
        }
        
        // 加载状态数据
        function loadStatusData() {
            fetchData('/api/status', (error, data) => {
                if (error) {
                    document.getElementById('system-info').innerHTML = 
                        `<div class="error">加载失败: ${error.message}</div>`;
                    return;
                }
                
                if (!data.success) {
                    document.getElementById('system-info').innerHTML = 
                        `<div class="error">获取状态失败: ${data.message || '未知错误'}</div>`;
                    return;
                }
                
                // 系统信息
                const sysInfo = data.data.system;
                document.getElementById('system-info').innerHTML = `
                    <div class="status-item">
                        <span>操作系统:</span>
                        <span>${sysInfo.os}</span>
                    </div>
                    <div class="status-item">
                        <span>Python版本:</span>
                        <span>${sysInfo.python}</span>
                    </div>
                    <div class="status-item">
                        <span>主机名:</span>
                        <span>${sysInfo.hostname}</span>
                    </div>
                `;
                
                // 服务状态
                const wechatStatus = data.data.wechat;
                const redisStatus = data.data.redis;
                
                document.getElementById('service-status').innerHTML = `
                    <div class="status-item">
                        <span>微信API:</span>
                        <span class="${wechatStatus.connected ? 'success' : 'error'}">
                            ${wechatStatus.connected ? '已连接' : '未连接'}
                        </span>
                    </div>
                    <div class="status-item">
                        <span>Redis:</span>
                        <span class="${redisStatus.connected ? 'success' : 'error'}">
                            ${redisStatus.connected ? '已连接' : '未连接'}
                        </span>
                    </div>
                `;
                
                // 资源使用情况
                const cpu = data.data.cpu;
                const memory = data.data.memory;
                const disk = data.data.disk;
                
                document.getElementById('resource-usage').innerHTML = `
                    <div class="status-item">
                        <span>CPU使用率:</span>
                        <span class="${cpu.percent > 80 ? 'warning' : ''}">${cpu.percent.toFixed(1)}%</span>
                    </div>
                    <div class="status-item">
                        <span>内存使用率:</span>
                        <span class="${memory.percent > 80 ? 'warning' : ''}">${memory.percent.toFixed(1)}%</span>
                    </div>
                    <div class="status-item">
                        <span>磁盘使用率:</span>
                        <span class="${disk.percent > 80 ? 'warning' : ''}">${disk.percent.toFixed(1)}%</span>
                    </div>
                `;
            });
        }
        
        // 页面加载完成后执行
        window.onload = function() {
            loadStatusData();
            // 每30秒自动刷新一次
            setInterval(loadStatusData, 30000);
        };
    </script>
</body>
</html>
