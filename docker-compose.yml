version: '3'

services:
  xybotv2:
    image: xiaoxinkeji/xbotv2:latest
    container_name: XYBotV2
    restart: on-failure:3
    ports:
      - "9000:9000"  # 原有的WechatAPI端口
      - "8080:8080"  # 新增的Web界面端口
    volumes:
      - xybotv2:/app
      - redis_data:/var/lib/redis

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./logs:/app/logs

volumes:
  redis_data:
    name: redis_data
  xybotv2:
    name: xybotv2