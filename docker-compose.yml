services:
  xbotv2:
    build: .
    image: xiaoxinkeji/xbotv2:latest
    container_name: XBotV2
    restart: on-failure:3
    ports:
      - "8080:8080"  # Web管理界面端口
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
      - ./resource:/app/resource
      - ./logs:/var/log/xbotv2
      - redis_data:/var/lib/redis
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1

volumes:
  redis_data:
    name: redis_data
  xbotv2:
    name: xbotv2