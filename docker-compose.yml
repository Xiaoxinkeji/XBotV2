services:
  xybotv2:
    image: henryxiaoyang/xybotv2:latest
    container_name: XYBotV2
    restart: on-failure:3
    ports:
      - "8080:8080"  # Web管理界面端口
    volumes:
      - xybotv2:/app
      - redis_data:/var/lib/redis

volumes:
  redis_data:
    name: redis_data
  xybotv2:
    name: xybotv2