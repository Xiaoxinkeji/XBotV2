{% extends "base.html" %}

{% block title %}微信登录 - XBotV2{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card my-5">
                <div class="card-header">
                    <h4 class="mb-0">微信登录</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        <div class="mb-3">
                            <label for="qrCodeInput" class="form-label">二维码链接</label>
                            <input type="text" class="form-control" id="qrCodeInput" name="qr_link" value="{{ qr_link }}" placeholder="请输入微信登录二维码链接">
                        </div>
                        <div class="d-grid gap-2">
                            <button type="button" id="generateQrcode" class="btn btn-primary">生成二维码</button>
                            <button id="viewLogs" class="btn btn-info" data-bs-toggle="modal" data-bs-target="#logsModal">
                                <i class="bi bi-journal-text"></i> 查看日志
                            </button>
                        </div>
                    </form>
                    <div class="text-center mt-4">
                        <div id="qrcode"></div>
                        <div id="qrcodeStatus" class="mt-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 日志查看模态框 -->
<div class="modal fade" id="logsModal" tabindex="-1" aria-labelledby="logsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="logsModalLabel">最近日志</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <div class="row">
                        <div class="col-md-4">
                            <input type="text" id="logSearch" class="form-control" placeholder="搜索日志...">
                        </div>
                        <div class="col-md-3">
                            <select id="logLevel" class="form-select">
                                <option value="">所有级别</option>
                                <option value="INFO">信息</option>
                                <option value="WARNING">警告</option>
                                <option value="ERROR">错误</option>
                                <option value="DEBUG">调试</option>
                            </select>
                        </div>
                        <div class="col-md-5">
                            <button id="refreshLogs" class="btn btn-sm btn-primary me-2">
                                <i class="bi bi-arrow-clockwise"></i> 刷新日志
                            </button>
                            <button id="extractQRCode" class="btn btn-sm btn-success">
                                <i class="bi bi-qr-code"></i> 提取二维码
                            </button>
                        </div>
                    </div>
                </div>
                <div id="logsList" class="border p-2 bg-light" style="height: 400px; overflow-y: auto; font-family: monospace; font-size: 0.9em;"></div>
                <div class="mt-2 d-flex justify-content-between align-items-center">
                    <div class="text-muted">
                        <small>日志自动更新时间: <span id="lastUpdated"></span></small>
                    </div>
                    <div>
                        <label for="logLimit" class="form-label mb-0 me-2">显示行数:</label>
                        <select id="logLimit" class="form-select form-select-sm d-inline-block" style="width: 80px;">
                            <option value="10">10</option>
                            <option value="20" selected>20</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<link rel="stylesheet noopener" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<style>
    #qrcode img {
        max-width: 100%;
        height: auto;
    }
    .login-success, .login-fail {
        padding: 20px;
    }
    .login-methods {
        border-right: 1px solid #eee;
    }
    @media (max-width: 768px) {
        .login-methods {
            border-right: none;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
    }
    
    /* 日志样式 */
    .log-line {
        padding: 2px 5px;
        border-bottom: 1px solid rgba(0,0,0,0.05);
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.4;
    }
    .log-line:hover {
        background-color: rgba(0,0,0,0.03);
    }
    .log-qrcode {
        font-weight: bold;
        background-color: rgba(25,135,84,0.1);
        padding: 4px 5px;
    }
    #logsList {
        font-size: 0.85rem;
        background-color: #f8f9fa;
        border-radius: 4px;
    }
    #lastUpdated {
        font-weight: bold;
    }
    .spinner-border {
        width: 1.5rem;
        height: 1.5rem;
    }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 当点击生成二维码按钮时
        document.getElementById('generateQrcode').addEventListener('click', function() {
            const qrLink = document.getElementById('qrCodeInput').value.trim();
            const qrcodeDiv = document.getElementById('qrcode');
            const statusDiv = document.getElementById('qrcodeStatus');
            
            if (!qrLink) {
                statusDiv.innerHTML = '<div class="alert alert-warning">请输入二维码链接</div>';
                return;
            }
            
            // 清空之前的内容
            qrcodeDiv.innerHTML = '';
            statusDiv.innerHTML = '';
            
            try {
                // 生成二维码
                const qr = qrcode(0, 'L');
                qr.addData(qrLink);
                qr.make();
                
                // 显示二维码
                qrcodeDiv.innerHTML = qr.createImgTag(5);
                statusDiv.innerHTML = '<div class="alert alert-success">请使用微信扫描二维码登录</div>';
            } catch (error) {
                console.error('生成二维码出错:', error);
                statusDiv.innerHTML = '<div class="alert alert-danger">生成二维码失败, 请检查链接格式</div>';
            }
        });
        
        // 日志处理相关函数
        // 当日志模态框显示时自动加载日志
        const logsModal = document.getElementById('logsModal');
        if (logsModal) {
            logsModal.addEventListener('shown.bs.modal', function() {
                loadLogs();
                // 设置自动刷新间隔
                startLogAutoRefresh();
            });
            
            logsModal.addEventListener('hidden.bs.modal', function() {
                // 停止自动刷新
                stopLogAutoRefresh();
            });
        }
        
        // 刷新日志按钮
        const refreshLogsBtn = document.getElementById('refreshLogs');
        if (refreshLogsBtn) {
            refreshLogsBtn.addEventListener('click', loadLogs);
        }
        
        // 提取二维码按钮
        const extractQRCodeBtn = document.getElementById('extractQRCode');
        if (extractQRCodeBtn) {
            extractQRCodeBtn.addEventListener('click', extractQRCodeFromLogs);
        }
        
        // 搜索输入框事件
        const logSearch = document.getElementById('logSearch');
        if (logSearch) {
            logSearch.addEventListener('input', debounce(loadLogs, 500));
        }
        
        // 日志级别选择事件
        const logLevel = document.getElementById('logLevel');
        if (logLevel) {
            logLevel.addEventListener('change', loadLogs);
        }
        
        // 日志数量限制选择事件
        const logLimit = document.getElementById('logLimit');
        if (logLimit) {
            logLimit.addEventListener('change', loadLogs);
        }
        
        // 自动检查二维码（页面加载后）
        setTimeout(autoCheckQRCode, 1000);
    });

    // 防抖函数
    function debounce(func, wait) {
        let timeout;
        return function() {
            const context = this;
            const args = arguments;
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(context, args), wait);
        };
    }

    let logRefreshInterval = null;

    // 开始日志自动刷新
    function startLogAutoRefresh() {
        // 每30秒自动刷新一次
        logRefreshInterval = setInterval(loadLogs, 30000);
    }

    // 停止日志自动刷新
    function stopLogAutoRefresh() {
        if (logRefreshInterval) {
            clearInterval(logRefreshInterval);
            logRefreshInterval = null;
        }
    }

    // 加载日志
    function loadLogs() {
        const logsList = document.getElementById('logsList');
        if (!logsList) return;
        
        // 显示加载状态
        logsList.innerHTML = '<div class="text-center my-3"><div class="spinner-border text-primary" role="status"></div><p class="mt-2">加载日志中...</p></div>';
        
        // 获取搜索、筛选和限制参数
        const searchQuery = document.getElementById('logSearch')?.value || '';
        const logLevel = document.getElementById('logLevel')?.value || '';
        const limit = document.getElementById('logLimit')?.value || '20';
        
        // 构建查询参数
        const params = new URLSearchParams();
        params.append('limit', limit);
        if (searchQuery) params.append('search', searchQuery);
        if (logLevel) params.append('level', logLevel);
        
        // 发送请求获取日志
        fetch(`/api/logs?${params.toString()}`)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP错误 ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                // 更新最后更新时间
                const lastUpdated = document.getElementById('lastUpdated');
                if (lastUpdated) {
                    const now = new Date();
                    lastUpdated.textContent = now.toLocaleTimeString();
                }
                
                // 检查是否有日志
                if (!data.logs || data.logs.length === 0) {
                    logsList.innerHTML = '<div class="alert alert-info">没有找到日志记录</div>';
                    return;
                }
                
                // 显示日志
                logsList.innerHTML = '';
                data.logs.forEach(log => {
                    const logLine = document.createElement('div');
                    logLine.className = 'log-line';
                    
                    // 检查是否包含二维码链接
                    const hasQrCode = log.includes("https://login.weixin.qq.com/") || 
                                      log.includes("https://open.weixin.qq.com/");
                    
                    if (hasQrCode) {
                        logLine.className += ' log-qrcode';
                    }
                    
                    // 应用颜色样式
                    if (log.includes('[ERROR]') || log.includes('错误')) {
                        logLine.className += ' text-danger';
                    } else if (log.includes('[WARNING]') || log.includes('警告')) {
                        logLine.className += ' text-warning';
                    } else if (log.includes('[INFO]') || log.includes('信息')) {
                        logLine.className += ' text-primary';
                    } else if (log.includes('[DEBUG]') || log.includes('调试')) {
                        logLine.className += ' text-muted';
                    }
                    
                    logLine.textContent = log;
                    logsList.appendChild(logLine);
                });
                
                // 滚动到底部
                logsList.scrollTop = logsList.scrollHeight;
            })
            .catch(error => {
                console.error('获取日志错误:', error);
                logsList.innerHTML = `<div class="alert alert-danger">加载日志失败: ${error.message}</div>`;
            });
    }

    // 从日志中提取二维码
    function extractQRCodeFromLogs() {
        const logsList = document.getElementById('logsList');
        const qrcodeInput = document.getElementById('qrCodeInput');
        
        if (!logsList || !qrcodeInput) return;
        
        // 找到所有包含二维码链接的日志行
        const qrCodeLines = logsList.querySelectorAll('.log-qrcode');
        
        if (qrCodeLines.length === 0) {
            alert('未在日志中找到二维码链接');
            return;
        }
        
        // 使用第一个找到的二维码（最近的）
        const qrCodeLine = qrCodeLines[qrCodeLines.length - 1].textContent;
        
        // 提取链接
        const qrCodeUrlMatch = qrCodeLine.match(/(https:\/\/login\.weixin\.qq\.com\/[^\s]+)|(https:\/\/open\.weixin\.qq\.com\/[^\s]+)/);
        
        if (qrCodeUrlMatch && qrCodeUrlMatch[0]) {
            const qrCodeUrl = qrCodeUrlMatch[0];
            qrcodeInput.value = qrCodeUrl;
            
            // 自动调用生成二维码按钮
            const generateQrcodeBtn = document.getElementById('generateQrcode');
            if (generateQrcodeBtn) {
                generateQrcodeBtn.click();
            }
            
            // 隐藏日志模态框
            const logsModal = bootstrap.Modal.getOrCreateInstance(document.getElementById('logsModal'));
            logsModal.hide();
        } else {
            alert('无法从日志中提取有效的二维码链接');
        }
    }

    // 自动检查并提取二维码
    function autoCheckQRCode() {
        // 获取当前输入框的值
        const qrcodeInput = document.getElementById('qrCodeInput');
        if (!qrcodeInput || qrcodeInput.value.trim() !== '') {
            // 如果输入框不存在或已有值，则不进行自动检查
            return;
        }
        
        // 请求最新的10条日志
        fetch('/api/logs?limit=10')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP错误 ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (!data.logs || data.logs.length === 0) {
                    return;
                }
                
                // 查找包含二维码链接的日志
                let qrCodeUrl = null;
                for (let i = data.logs.length - 1; i >= 0; i--) {
                    const log = data.logs[i];
                    const qrCodeUrlMatch = log.match(/(https:\/\/login\.weixin\.qq\.com\/[^\s]+)|(https:\/\/open\.weixin\.qq\.com\/[^\s]+)/);
                    if (qrCodeUrlMatch && qrCodeUrlMatch[0]) {
                        qrCodeUrl = qrCodeUrlMatch[0];
                        break;
                    }
                }
                
                // 如果找到二维码链接
                if (qrCodeUrl) {
                    qrcodeInput.value = qrCodeUrl;
                    
                    // 自动调用生成二维码按钮
                    const generateQrcodeBtn = document.getElementById('generateQrcode');
                    if (generateQrcodeBtn) {
                        generateQrcodeBtn.click();
                    }
                    
                    console.log('自动检测到二维码链接:', qrCodeUrl);
                }
            })
            .catch(error => {
                console.error('自动检查二维码错误:', error);
            });
    }
</script>
{% endblock %}
